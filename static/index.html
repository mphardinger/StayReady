<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script>
    /* Stamp theme + accent before any CSS paints so dark mode never flashes
       white. Kept in sync with App.applyTheme (js/app.js). */
    (function () {
      var dark = false, accent = 'red';
      try {
        var pref = localStorage.getItem('sr-theme') || 'system';
        dark = pref === 'dark' || (pref === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        accent = localStorage.getItem('sr-accent') || 'red';
      } catch (e) { /* defaults */ }
      document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      document.documentElement.dataset.accent = accent;
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Stay Ready — Meal Planning</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥕</text></svg>">
  <link rel="stylesheet" href="css/styles.css">

  <!-- PWA: installable to a phone home screen, runs full-screen -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#8E1620">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Stay Ready">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<body>
  <div id="app"></div>
  <script src="js/app.js"></script>
  <script src="js/views/auth.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/plan.js"></script>
  <script src="js/views/recipes.js"></script>
  <script src="js/views/pantry.js"></script>
  <script src="js/views/shopping.js"></script>
  <script src="js/views/balance.js"></script>
  <script src="js/views/household.js"></script>
  <script src="js/views/settings.js"></script>
  <script>App.boot();</script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => { /* offline support is best-effort */ });
      });
    }
  </script>
</body>
</html>
